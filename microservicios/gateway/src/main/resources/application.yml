server:
  port: 8080

spring:
  application:
    name: gateway
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: auth
              uri: http://auth:8080
              predicates:
                - Path=/auth/**

            - id: donation
              uri: http://donation:8080
              predicates:
                - Path=/donation/**
              filters:
                - RewritePath=/donation(?<segment>/?.*), /donations${segment}

            - id: donations-alias
              uri: http://donation:8080
              predicates:
                - Path=/donations/**

            - id: logistics
              uri: http://logistics:8080
              predicates:
                - Path=/logistics/**
              filters:
                - RewritePath=/logistics(?<segment>/?.*), /envios${segment}

            - id: envios
              uri: http://logistics:8080
              predicates:
                - Path=/envios/**

            - id: needs
              uri: http://needs:8080
              predicates:
                - Path=/needs/**

          globalcors:
            cors-configurations:
              "[/**]":
                allowedOrigins:
                  - "*"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - PATCH
                allowedHeaders:
                  - "*"
                allowCredentials: false

jwt:
  secret: mi_clave_secreta_muy_larga_para_hs256_segura_12345
  expiration: 86400000
